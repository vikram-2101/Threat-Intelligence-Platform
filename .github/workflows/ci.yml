name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          
      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install ruff mypy pytest pytest-asyncio fakeredis fastapi sqlalchemy pydantic pydantic-settings celery redis httpx python-jose passlib structlog
          
      - name: Lint with Ruff
        run: |
          cd backend
          ruff check .
          ruff format --check .
          
      - name: Type check with mypy
        run: |
          cd backend
          mypy app
          
      - name: Run tests
        run: |
          cd backend
          pytest
