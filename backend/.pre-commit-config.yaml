repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.0
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic
          - fastapi
          - pydantic-settings
          - sqlalchemy
          - types-redis
          - types-python-jose
          - types-passlib
        args: [--config-file=backend/pyproject.toml, --strict]
